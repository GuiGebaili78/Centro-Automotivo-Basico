server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache para assets versionados pelo Vite (hashes no nome)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: rotas client-side caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
