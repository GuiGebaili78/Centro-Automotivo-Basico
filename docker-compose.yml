services:
  # 1. Banco PostgreSQL
  centroautomotivo_db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: automotivo_db
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d automotivo_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. API (Node/Express) — só interno; quem expõe é o nginx
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: automotivo-api
    command: sh -c "npx prisma migrate deploy && npm start"
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://user:password@centroautomotivo_db:5432/automotivo_db
      PORT: 3000
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=2048"
      FRONTEND_URL: https://painel.gunz.com.br
    depends_on:
      centroautomotivo_db:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
      - ./uploads:/app/server/uploads
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. Frontend (React) — build estático servido por nginx interno na 8080.
  #    Em prod, VITE_API_URL é inlineada no bundle em tempo de build.
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: https://hapi.gunz.com.br/api
    image: automotivo-client
    restart: always
    expose:
      - "8080"
    depends_on:
      - api
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 4. Reverse proxy (TLS termination com Cloudflare Origin Cert)
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - client
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
