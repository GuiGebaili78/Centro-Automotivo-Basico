# Override para desenvolvimento local.
# Uso: ./dev.sh   (faz "docker compose -f docker-compose.yml -f docker-compose.dev.yml up")
# Em prod, NÃO usar este arquivo — basta "docker compose up -d" (ou ./deploy.sh).

services:
  api:
    # Sobrescreve o command de prod por hot-reload (tsx watch) com sincronização do banco (db push)
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db push && npm run dev"
    environment:
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      NODE_OPTIONS: --max-old-space-size=512
    ports:
      - "127.0.0.1:3000:3000"

  client:
    # Em dev usa o stage "dev" do Dockerfile (Vite dev server + HMR)
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    command: sh -c "npm run dev"
    # Sobe pelas portas direto, sem passar pelo nginx
    # 127.0.0.1: força IPv4 para evitar conflito com wslrelay no Windows
    ports:
      - "127.0.0.1:5173:5173"
    shm_size: '256m'
    environment:
      NODE_OPTIONS: --max-old-space-size=512
      VITE_API_URL: http://localhost:3000/api
      VITE_PORT: "5173"
      VITE_ALLOWED_HOSTS: ""
      VITE_HMR_CLIENT_PORT: "5173"

  # Em dev não precisa do reverse proxy nginx (libera as 80/443 do host).
  nginx:
    profiles:
      - never
