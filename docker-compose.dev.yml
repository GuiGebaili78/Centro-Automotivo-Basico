# Override para desenvolvimento local.
# Uso: ./dev.sh   (faz "docker compose -f docker-compose.yml -f docker-compose.dev.yml up")
# Em prod, NÃO usar este arquivo — basta "docker compose up -d" (ou ./deploy.sh).

services:
  api:
    # Sobrescreve o command de prod por hot-reload (tsx watch)
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run dev"
    environment:
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"

  client:
    # Em dev usa o stage "dev" do Dockerfile (Vite dev server + HMR)
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    # Sobe pelas portas direto, sem passar pelo nginx
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_PORT: "5173"
      VITE_ALLOWED_HOSTS: ""
      VITE_HMR_HOST: ""
      VITE_HMR_PROTOCOL: ws
      VITE_HMR_CLIENT_PORT: "5173"
    # Em dev precisa do bind do código pra HMR funcionar
    volumes:
      - ./client:/app/client
      - /app/client/node_modules

  # Em dev não precisa do reverse proxy nginx (libera as 80/443 do host).
  nginx:
    profiles:
      - never
