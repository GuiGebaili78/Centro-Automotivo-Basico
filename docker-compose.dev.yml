# Override para desenvolvimento local.
# Uso: ./dev.sh   (que faz "docker compose -f docker-compose.yml -f docker-compose.dev.yml up")
# Em prod, NÃO usar este arquivo — basta "docker compose up -d".

services:
  api:
    environment:
      FRONTEND_URL: http://localhost:5173

  client:
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_PORT: "5173"
      # Em dev libera qualquer host
      VITE_ALLOWED_HOSTS: ""
      VITE_HMR_HOST: ""
      VITE_HMR_PROTOCOL: ws
      VITE_HMR_CLIENT_PORT: "5173"
